<style>
:root{
  --white:#fff;--bg:#faf9f6;
  --text:#222;--text-sub:#555;--text-light:#888;
  --gold:#b8922e;--gold-light:#f0d77b;
  --red:#d72631;--red-dark:#b51d26;--black:#1a1a1a;
  --border:#e8e4dc;--shadow:rgba(0,0,0,.08);
  --font:'Noto Sans JP',sans-serif;--font-a:'Zen Kaku Gothic New',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font);line-height:1.8;overflow-x:hidden;-webkit-font-smoothing:antialiased}
img{max-width:100%;display:block}
a{color:inherit;text-decoration:none}

/* ── ヘッダー ── */
header{position:fixed;top:0;left:0;right:0;z-index:1000;background:rgba(255,255,255,.93);backdrop-filter:blur(14px);border-bottom:1px solid var(--border)}
.h-inner{max-width:1180px;margin:0 auto;padding:0 clamp(16px,4vw,40px);display:flex;align-items:center;justify-content:space-between;height:68px}
.logo{display:flex;align-items:center}
.logo img{height:52px;width:auto;object-fit:contain}
nav{display:flex;align-items:center;gap:16px}
nav a{color:var(--text-sub);font-size:.74rem;font-weight:700;transition:color .3s}
nav a:hover{color:var(--red)}
.ncta{background:var(--red);color:#fff!important;padding:8px 18px;font-weight:700!important;font-size:.72rem!important;border-radius:4px;transition:background .3s!important}
.ncta:hover{background:var(--red-dark)!important}
.hbr{display:none;background:none;border:none;cursor:pointer;padding:6px}
.hbr span{display:block;width:22px;height:2px;background:var(--text);margin:5px 0}
.mnav{display:none;position:fixed;top:68px;left:0;right:0;z-index:999;background:rgba(255,255,255,.97);backdrop-filter:blur(14px);padding:16px 24px;border-bottom:1px solid var(--border)}
.mnav.open{display:block}
.mnav a{display:block;padding:12px 0;color:var(--text-sub);font-size:.85rem;border-bottom:1px solid #eee}

/* ── パンくず ── */
.breadcrumb{background:var(--white);border-bottom:1px solid var(--border);padding:10px 0}
.bc-inner{max-width:1180px;margin:0 auto;padding:0 clamp(16px,4vw,40px);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.bc-inner a,.bc-inner span{font-size:.72rem;color:var(--text-light)}
.bc-inner a:hover{color:var(--red)}
.bc-sep{color:#ccc}
.bc-inner .current{color:var(--text-sub);font-weight:700}

/* ── ページヒーロー ── */
.page-hero{background:var(--black);padding:clamp(36px,6vw,64px) 0 clamp(28px,5vw,48px)}
.page-hero-inner{max-width:1180px;margin:0 auto;padding:0 clamp(16px,4vw,40px)}
.page-hero-label{font-size:.64rem;letter-spacing:.24em;color:var(--gold-light);font-weight:700;margin-bottom:12px}
.page-hero-title{font-family:var(--font-a);font-size:clamp(1.6rem,4vw,2.6rem);font-weight:900;color:var(--white);line-height:1.25}

/* ── メイン ── */
.page-wrap{padding-top:68px}
.main-area{max-width:1180px;margin:0 auto;padding:clamp(32px,5vw,56px) clamp(16px,4vw,40px) clamp(60px,10vw,100px)}

/* ── セクション見出し ── */
.sec-head{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;margin-bottom:24px;padding-bottom:12px;border-bottom:2px solid var(--border)}
.sec-label{font-family:var(--font-a);font-size:1.5rem;font-weight:900;color:var(--black)}
.sec-sub{font-size:.8rem;color:var(--text-sub)}
.sec-count{font-size:.72rem;color:var(--text-light);margin-left:auto;font-weight:700}

/* ── セクション間余白 ── */
.pg-section{margin-bottom:clamp(56px,8vw,96px)}

/* ── Masonry（営業現場写真） ── */
.masonry{
  columns:4;
  column-gap:10px;
}
.ms-item{
  break-inside:avoid;
  margin-bottom:10px;
  cursor:pointer;
  overflow:hidden;
  border-radius:6px;
  background:#e8e5de;
}
.ms-item img{
  width:100%;
  height:auto;
  display:block;
  transition:transform .35s ease,opacity .2s;
  opacity:.92;
}
.ms-item:hover img{transform:scale(1.04);opacity:1}

/* ── Gallery grid（スタジオ名場面集） ── */
.gal-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}
.gal-item{
  aspect-ratio:16/9;
  overflow:hidden;
  border-radius:6px;
  cursor:pointer;
  background:#e8e5de;
}
.gal-item img{
  width:100%;height:100%;
  object-fit:cover;object-position:center;
  transition:transform .35s ease,opacity .2s;
  opacity:.92;
}
.gal-item:hover img{transform:scale(1.05);opacity:1}

/* ── モーダル ── */
.modal{
  display:none;position:fixed;inset:0;z-index:2000;
  background:rgba(0,0,0,.92);
  align-items:center;justify-content:center;
}
.modal.open{display:flex}
.modal-inner{
  position:relative;max-width:90vw;max-height:90vh;
  display:flex;align-items:center;gap:16px;
}
.modal-img{
  max-width:80vw;max-height:86vh;
  object-fit:contain;border-radius:4px;
  user-select:none;
}
.modal-close{
  position:fixed;top:18px;right:20px;
  background:none;border:none;color:#fff;font-size:2rem;
  cursor:pointer;line-height:1;z-index:2001;opacity:.7;transition:opacity .2s;
}
.modal-close:hover{opacity:1}
.modal-nav{
  position:fixed;top:50%;transform:translateY(-50%);
  background:rgba(255,255,255,.12);border:none;color:#fff;
  font-size:1.6rem;width:48px;height:80px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;border-radius:4px;z-index:2001;
  transition:background .2s;
}
.modal-nav:hover{background:rgba(255,255,255,.25)}
.modal-nav.prev{left:10px}
.modal-nav.next{right:10px}
.modal-info{
  position:fixed;bottom:14px;left:50%;transform:translateX(-50%);
  color:#aaa;font-size:.76rem;white-space:nowrap;
}

/* ── タブ ── */
.pg-tabs{display:flex;gap:4px;margin-bottom:32px;border-bottom:2px solid var(--border)}
.pg-tab{padding:10px 20px;font-size:.82rem;font-weight:700;background:none;border:none;border-bottom:3px solid transparent;margin-bottom:-2px;cursor:pointer;color:var(--text-sub);transition:color .2s,border-color .2s;white-space:nowrap}
.pg-tab.active{color:var(--red);border-bottom-color:var(--red)}
.pg-tab:hover:not(.active){color:var(--text)}
.pg-panel{display:none}
.pg-panel.active{display:block}
@media(max-width:480px){.pg-tab{padding:10px 14px;font-size:.76rem}}

/* ── 下部導線 ── */
.bottom-nav{max-width:1180px;margin:0 auto;padding:0 clamp(16px,4vw,40px) clamp(60px,10vw,90px);display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.bottom-link{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;border-radius:6px;font-size:.8rem;font-weight:700;border:1.5px solid var(--border);color:var(--text-sub);background:var(--white);transition:all .25s}
.bottom-link:hover{border-color:var(--text);color:var(--black)}

/* ── フッター ── */
footer{background:var(--black);color:#888;padding:32px 0}
.ft-inner{max-width:1180px;margin:0 auto;padding:0 clamp(16px,4vw,40px);display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px;align-items:center}
footer p{font-size:.68rem}
footer a{color:#888;transition:color .3s}
footer a:hover{color:var(--gold-light)}

/* ── フェードイン ── */
.fi{opacity:0;transform:translateY(16px);transition:opacity .5s,transform .5s}
.fi.v{opacity:1;transform:translateY(0)}

/* ── レスポンシブ ── */
@media(max-width:960px){
  nav a:not(.ncta){display:none}
  .hbr{display:block}
  .masonry{columns:3}
  .gal-grid{grid-template-columns:repeat(3,1fr)}
}
@media(max-width:640px){
  .masonry{columns:2;column-gap:8px}
  .ms-item{margin-bottom:8px}
  .gal-grid{grid-template-columns:repeat(2,1fr);gap:8px}
  .modal-nav{width:40px;height:60px;font-size:1.2rem}
  .modal-img{max-width:95vw;max-height:82vh}
}
@media(max-width:400px){
  .masonry{columns:1}
  .gal-grid{grid-template-columns:1fr}
}
</style>

var currentSection = 'scene';
var currentIndex = 0;

function openModal(section, idx) {
  currentSection = section;
  currentIndex = idx;
  showModal();
}

function showModal() {
  var files = currentSection === 'scene' ? sceneFiles : galleryFiles;
  var dir   = currentSection === 'scene' ? 'images/scene/' : 'images/gallery/';
  var total = files.length;
  var fname = files[currentIndex];
  var img = document.getElementById('modal-img');
  img.src = dir + fname;
  img.alt = fname;
  document.getElementById('modal-info').textContent = (currentIndex + 1) + ' / ' + total;
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function navModal(dir) {
  var files = currentSection === 'scene' ? sceneFiles : galleryFiles;
  currentIndex = (currentIndex + dir + files.length) % files.length;
  showModal();
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
}

function closeModalBg(e) {
  if (e.target === document.getElementById('modal')) closeModal();
}

document.addEventListener('keydown', function(e) {
  var m = document.getElementById('modal');
  if (!m.classList.contains('open')) return;
  if (e.key === 'Escape')      closeModal();
  if (e.key === 'ArrowRight')  navModal(1);
  if (e.key === 'ArrowLeft')   navModal(-1);
});

/* スワイプ対応 */
(function() {
  var startX = 0;
  var m = document.getElementById('modal');
  m.addEventListener('touchstart', function(e) { startX = e.touches[0].clientX; }, {passive:true});
  m.addEventListener('touchend', function(e) {
    var dx = e.changedTouches[0].clientX - startX;
    if (Math.abs(dx) > 40) navModal(dx < 0 ? 1 : -1);
  }, {passive:true});
})();

/* ── タブ切り替え ── */
function switchTab(panelId, btn) {
  document.querySelectorAll('.pg-panel').forEach(function(p) { p.classList.remove('active'); });
  document.querySelectorAll('.pg-tab').forEach(function(b) { b.classList.remove('active'); });
  document.getElementById(panelId).classList.add('active');
  btn.classList.add('active');
}

/* ── フェードイン ── */
var obs = new IntersectionObserver(function(entries) {
  entries.forEach(function(e) {
    if (e.isIntersecting) { e.target.classList.add('v'); obs.unobserve(e.target); }
  });
}, { threshold: 0.04, rootMargin: '0px 0px -8px 0px' });
document.querySelectorAll('.fi').forEach(function(el) { obs.observe(el); });

/* ── ハンバーガー ── */
document.querySelectorAll('.mnav a').forEach(function(a) {
  a.addEventListener('click', function() { document.getElementById('mn').classList.remove('open'); });
